name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup UV
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Cache virtual environment
        id: venv-cache
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-3.12-${{ hashFiles('uv.lock') }}
      
      - name: Sync dependencies
        if: steps.venv-cache.outputs.cache-hit != 'true'
        run: uv sync

  lint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup UV
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true
      
      - name: Restore virtual environment cache
        id: venv-cache
        uses: actions/cache/restore@v4
        with:
          path: .venv
          key: venv-3.12-${{ hashFiles('uv.lock') }}
      
      - name: Sync dependencies
        if: steps.venv-cache.outputs.cache-hit != 'true'
        run: uv sync
      
      - name: Run Ruff check
        run: uv run ruff check src tests examples
      
      - name: Run Ruff format check
        run: uv run ruff format --check src tests examples

  typecheck:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup UV
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true
      
      - name: Restore virtual environment cache
        id: venv-cache
        uses: actions/cache/restore@v4
        with:
          path: .venv
          key: venv-3.12-${{ hashFiles('uv.lock') }}
      
      - name: Sync dependencies
        if: steps.venv-cache.outputs.cache-hit != 'true'
        run: uv sync
      
      - name: Run Pyright
        run: uv run pyright

  test:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup UV
        uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      
      - name: Restore virtual environment cache
        id: venv-cache
        uses: actions/cache/restore@v4
        with:
          path: .venv
          key: venv-${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
      
      - name: Sync dependencies
        if: steps.venv-cache.outputs.cache-hit != 'true'
        run: uv sync
      
      - name: Run tests
        run: uv run pytest --tb=short -q
