name: Security Advisory
description: >
  Report a security vulnerability. This template is for PUBLIC disclosure
  only — e.g. after a CVE has already been published. For private reporting,
  follow the instructions in SECURITY.md.
labels: ["security"]
body:
  - type: markdown
    attributes:
      value: |
        > **Stop — is this a new, undisclosed vulnerability?**
        > Please **do not** use this public template. Instead, report it
        > privately via the [Security Advisories](../../security/advisories/new)
        > page or by email as described in [SECURITY.md](../../blob/main/SECURITY.md).
        >
        > Use this form only **after** coordinated disclosure is complete
        > (CVE published / advisory released).

  - type: input
    id: cve
    attributes:
      label: CVE / Advisory ID
      placeholder: "e.g. CVE-2025-12345 or GHSA-xxxx-xxxx-xxxx"
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Severity (CVSS v3)
      options:
        - "Critical (9.0 – 10.0)"
        - "High (7.0 – 8.9)"
        - "Medium (4.0 – 6.9)"
        - "Low (0.1 – 3.9)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear summary of the vulnerability and its impact.
    validations:
      required: true

  - type: textarea
    id: affected
    attributes:
      label: Affected Versions
      placeholder: "e.g. < 0.2.1"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Minimal steps or proof-of-concept to reproduce the issue.
      render: python
    validations:
      required: false

  - type: textarea
    id: mitigation
    attributes:
      label: Mitigation / Fix
      description: >
        Describe the patch or workaround. Reference the commit or release
        that resolves the issue.
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: References
      description: Links to the advisory, CVE entry, patch PR, or related resources.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have followed the responsible disclosure process described in SECURITY.md.
          required: true
        - label: A patched release is already available (or this is a post-disclosure discussion).
          required: true
